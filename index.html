<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社ツール説明ページ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>会社ツール説明ページ</h1>
            <p>各ツールの使い方をまとめています</p>
        </header>

        <main class="home-content">
            <section class="tools-grid">
                <div class="tool-card" data-tool="activemail">
                    <div class="tool-icon">📧</div>
                    <h2>ActiveMail</h2>
                    <p>メール管理システム</p>
                    <button class="btn btn-primary">詳細を見る</button>
                </div>

                <div class="tool-card" data-tool="king-of-time">
                    <div class="tool-icon">⏰</div>
                    <h2>KING OF TIME</h2>
                    <p>勤務時間管理システム</p>
                    <button class="btn btn-primary">詳細を見る</button>
                </div>

                <div class="tool-card" data-tool="desknet-neo">
                    <div class="tool-icon">📅</div>
                    <h2>desknet's NEO</h2>
                    <p>グループウェア</p>
                    <button class="btn btn-primary">詳細を見る</button>
                </div>

                <div class="tool-card" data-tool="teams">
                    <div class="tool-icon">👥</div>
                    <h2>Teams</h2>
                    <p>コミュニケーションプラットフォーム</p>
                    <button class="btn btn-primary">詳細を見る</button>
                </div>

                <div class="tool-card" data-tool="office-station">
                    <div class="tool-icon">🏢</div>
                    <h2>オフィスステーション</h2>
                    <p>統合人事管理システム</p>
                    <button class="btn btn-primary">詳細を見る</button>
                </div>

                <div class="tool-card" data-tool="rakuraku-seisan">
                    <div class="tool-icon">💰</div>
                    <h2>楽々清算</h2>
                    <p>経費精算システム</p>
                    <button class="btn btn-primary">詳細を見る</button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
